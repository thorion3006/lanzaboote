name: "Setup Activation"
description: "Bootstrap gh-aw activation files into the runner environment"
author: "GitHub Next"

inputs:
  destination:
    description: "Destination directory for activation files"
    required: false
    default: "/opt/gh-aw/actions"
  safe-output-custom-tokens:
    description: "Install @actions/github when safe outputs use handler-specific tokens"
    required: false
    default: "false"

outputs:
  files-copied:
    description: "Number of files copied"

runs:
  using: "composite"
  steps:
    - name: Setup Activation Scripts
      shell: bash
      env:
        INPUT_DESTINATION: ${{ inputs.destination }}
        INPUT_SAFE_OUTPUT_CUSTOM_TOKENS: ${{ inputs.safe-output-custom-tokens }}
      run: ${{ github.action_path }}/setup.sh

branding:
  icon: "play"
  color: "blue"
